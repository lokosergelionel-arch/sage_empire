{% extends 'base.html' %}
{% load static %}

{% block title %}Sage Empire - {% block auth_title %}Authentification{% endblock %}{% endblock %}

{% block content %}

<section class="auth-shell">
    <div class="auth-card">

        <div class="auth-brand">
            <img src="{% static 'images/logo.png' %}" alt="Sage Empire">
        </div>

        {% block auth_content %}
        {% endblock auth_content %}

    </div>
</section>

<style>
    .auth-shell {
        min-height: calc(100vh - 90px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--ivory);
        padding: 80px 20px;
    }

    .auth-card {
        width: 100%;
        max-width: 500px;
        background: white;
        border: 1px solid var(--border);
        padding: 60px 55px;
        text-align: center;
        box-shadow: 0 25px 75px rgba(26, 26, 26, 0.07);
        border-radius: 16px;
    }

    .auth-brand {
        margin-bottom: 40px;
    }

    .auth-brand img {
        height: 62px;
        width: auto;
    }

    .auth-card h2 {
        font-family: 'Cinzel', serif;
        font-size: 1.75rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--charcoal);
        margin: 0 0 18px;
        font-weight: 700;
    }

    .auth-subtitle {
        font-size: 0.95rem;
        color: #666;
        line-height: 1.75;
        margin-bottom: 40px;
    }

    .auth-form {
        margin-top: 10px;
    }

    .auth-field {
        margin-bottom: 26px;
        text-align: left;
        position: relative;
    }

    .auth-field label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.85rem;
        color: #555;
        font-weight: 500;
    }

    .auth-input {
        width: 100%;
        height: 58px;
        padding: 0 18px;
        border: 1.5px solid var(--border);
        background: white;
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s;
    }

    .auth-input:focus {
        border-color: var(--gold);
    }

    /* Icône œil pour voir le mot de passe */
    .toggle-password {
        position: absolute;
        right: 18px;
        top: 38px;
        cursor: pointer;
        color: #888;
        font-size: 1.1rem;
    }

    .auth-button {
        width: 100%;
        height: 58px;
        background: var(--charcoal);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
        transition: all 0.3s;
    }

    .auth-button:hover {
        background: var(--gold);
    }

    .auth-link {
        display: block;
        margin-top: 30px;
        color: var(--gold);
        text-decoration: none;
        font-weight: 600;
    }

    .auth-error {
        color: #c23a3a;
        font-size: 0.8rem;
        margin-top: 6px;
    }

    @media (max-width: 600px) {
        .auth-card {
            padding: 45px 30px;
        }
        .auth-shell {
            padding: 50px 15px;
        }
    }

    .password-wrapper {
    position: relative;
}

.toggle-password {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-25%);
    cursor: pointer;
    font-size: 1.3rem;
    color: #888;
    user-select: none;
}

.auth-field label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.88rem;
    color: #555;
    font-weight: 500;
}

</style>

{% endblock %}
