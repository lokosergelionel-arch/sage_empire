{% extends 'base.html' %}
{% load static %}

{% block title %}Sage Empire - {% block auth_title %}Authentification{% endblock %}{% endblock %}

{% block content %}

<section class="auth-shell">
    <div class="auth-card">

        <div class="auth-brand">
            <img src="{% static 'images/logo.png' %}" alt="Sage Empire">
        </div>

        {% block auth_content %}
        {% endblock auth_content %}

    </div>
</section>

<style>
    .auth-shell {
        min-height: calc(100vh - 90px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--ivory);
        padding: 70px 20px;
    }

    .auth-shell + footer {
        margin-top: 0 !important;
    }

    .auth-card {
        width: 100%;
        max-width: 500px;
        background: white;
        border: 1px solid var(--border);
        padding: 48px 50px 46px;
        text-align: center;
        box-shadow: 0 24px 70px rgba(26, 26, 26, 0.055);
    }

    .auth-brand {
        margin-bottom: 36px;
    }

    .auth-brand img {
        height: 58px;
        width: auto;
        display: inline-block;
    }

    .auth-kicker {
        font-size: 0.72rem;
        color: #8E8E8E;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 600;
    }

    .auth-card h2 {
        font-family: 'Cinzel', serif;
        font-size: 1.55rem;
        line-height: 1.45;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--charcoal);
        margin: 0 0 14px;
        font-weight: 700;
    }

    .auth-card .auth-subtitle {
        font-size: 0.9rem;
        color: #8A8A8A;
        line-height: 1.7;
        margin: 0 0 34px;
    }

    .auth-form {
        margin-top: 26px;
    }

    .auth-field {
        margin-bottom: 18px;
        text-align: left;
    }

    .auth-field label {
        display: none;
    }

    .auth-input,
    .auth-card input[type="email"],
    .auth-card input[type="password"],
    .auth-card input[type="text"] {
        width: 100%;
        height: 52px;
        border: 1px solid var(--border);
        background: var(--ivory);
        color: var(--charcoal);
        padding: 0 16px;
        font-family: 'Inter', sans-serif;
        font-size: 0.88rem;
        outline: none;
        transition: all 0.25s ease;
    }

    .auth-input::placeholder,
    .auth-card input::placeholder {
        color: #8D8D8D;
        text-transform: uppercase;
        letter-spacing: 0.7px;
    }

    .auth-input:focus,
    .auth-card input:focus {
        border-color: var(--gold);
        background: white;
    }

    .auth-button,
    .btn-gold {
        width: 100%;
        height: 54px;
        border: none;
        background: var(--charcoal);
        color: white;
        font-size: 0.78rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.35s ease;
        margin-top: 10px;
    }

    .auth-button:hover,
    .btn-gold:hover {
        background: var(--gold);
    }

    .auth-link {
        display: inline-block;
        margin-top: 24px;
        color: var(--gold);
        font-size: 0.88rem;
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 3px;
    }

    .auth-link:hover {
        color: var(--charcoal);
    }

    .auth-secondary-link {
        margin-top: 26px;
        font-size: 0.78rem;
        color: #A0A0A0;
    }

    .auth-secondary-link a {
        color: var(--charcoal);
        font-weight: 700;
        text-decoration: none;
    }

    .auth-message {
        font-size: 0.9rem;
        color: #666;
        line-height: 1.7;
        margin-bottom: 30px;
    }

    .auth-error {
        color: #9F2A2A;
        font-size: 0.78rem;
        margin-top: 8px;
    }

    @media (max-width: 600px) {
        .auth-shell {
            padding: 45px 18px;
        }

        .auth-card {
            padding: 38px 28px;
        }

        .auth-card h2 {
            font-size: 1.25rem;
            letter-spacing: 3px;
        }

        .auth-brand img {
            height: 50px;
        }
    }
</style>

{% endblock %}
