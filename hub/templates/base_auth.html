{% extends 'base.html' %}
{% load static %}

{% block title %}Sage Empire - {% block auth_title %}Authentification{% endblock %}{% endblock %}

{% block content %}

    <div class="auth-page">
        <div class="auth-card">
            {% block auth_content %}
            {% endblock auth_content %}
        </div>
    </div>

    <style>
        .auth-page {
            min-height: calc(100vh - 85px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--ivory);
            padding: 40px 20px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            padding: 50px 45px;
            width: 100%;
            max-width: 460px;
            border: 1px solid #f0ede6;
        }

        .auth-card h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--charcoal);
            text-align: center;
            margin-bottom: 12px;
        }

        .auth-card p {
            text-align: center;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-gold {
            width: 100%;
            background: var(--gold);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            background: #9f7d4f;
            transform: translateY(-3px);
        }

        .link-back {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
        }

        .success-icon {
            font-size: 4rem;
            display: block;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>

{% endblock %}
