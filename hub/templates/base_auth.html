{% extends 'base.html' %}
{% load static %}

{% block title %}Sage Empire - {% block auth_title %}Authentification{% endblock %}{% endblock %}

{% block content %}

    <div class="auth-page">
        <div class="auth-card">
            {% block auth_content %}
            {% endblock auth_content %}
        </div>
    </div>

    <style>
        .auth-page {
            min-height: calc(100vh - 85px);
            background: #F9F8F6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.09);
            padding: 55px 50px;
            width: 100%;
            max-width: 460px;
        }

        .auth-card h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.9rem;
            color: #1A1A1A;
            text-align: center;
            margin-bottom: 14px;
            font-weight: 700;
        }

        .auth-card p {
            text-align: center;
            color: #555;
            line-height: 1.7;
            margin-bottom: 35px;
        }

        .btn-gold {
            width: 100%;
            background: #B5935E;
            color: white;
            border: none;
            padding: 17px;
            border-radius: 8px;
            font-size: 1.08rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-gold:hover {
            background: #9f7d4f;
            transform: translateY(-3px);
        }

        .link-back {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #B5935E;
            text-decoration: none;
            font-weight: 500;
        }

        .link-back:hover {
            text-decoration: underline;
        }
    </style>

{% endblock %}
