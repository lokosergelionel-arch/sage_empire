{% extends 'base.html' %}
{% load static %}

{% block title %}Sage Empire - {% block auth_title %}Authentification{% endblock %}{% endblock %}

{% block content %}

<section class="auth-shell">
    <div class="auth-card">

        <div class="auth-brand">
            <!-- Vérifie que l'image existe ou mets un fallback texte -->
            <img src="{% static 'images/logo.png' %}" alt="Sage Empire" onerror="this.style.display='none';">
        </div>

        {% block auth_content %}
        {% endblock auth_content %}

    </div>
</section>

<style>
    /* Layout général */
    .auth-shell {
        min-height: calc(100vh - 90px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--ivory, #fdfcf8); /* Fallback color */
        padding: 80px 20px;
    }

    .auth-card {
        width: 100%;
        max-width: 500px;
        background: white;
        border: 1px solid var(--border, #e0e0e0);
        padding: 60px 55px;
        text-align: center;
        box-shadow: 0 25px 75px rgba(0, 0, 0, 0.07);
        border-radius: 16px;
    }

    .auth-brand {
        margin-bottom: 40px;
        display: flex;
        justify-content: center;
    }

    .auth-brand img {
        height: 62px;
        width: auto;
        max-width: 100%;
    }

    .auth-card h2 {
        font-family: 'Cinzel', serif;
        font-size: 1.75rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--charcoal, #333);
        margin: 0 0 18px;
        font-weight: 700;
        line-height: 1.2;
    }

    .auth-subtitle {
        font-size: 0.95rem;
        color: #666;
        line-height: 1.6;
        margin-bottom: 40px;
    }

    .auth-form {
        margin-top: 10px;
    }

    .auth-field {
        margin-bottom: 26px;
        text-align: left;
        position: relative;
    }

    .auth-field label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.85rem;
        color: #555;
        font-weight: 600;
        letter-spacing: 0.3px;
    }

    /* Input Style */
    .auth-input {
        width: 100%;
        height: 58px;
        padding: 0 45px 0 18px; /* Padding droit augmenté pour laisser place à l'icône */
        box-sizing: border-box; /* Important pour respecter la hauteur */
        border: 1.5px solid var(--border, #ddd);
        background: #fff;
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s ease;
        color: #333;
    }

    .auth-input:focus {
        border-color: var(--gold, #d4af37);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    }

    /* --- Gestion de l'icône œil (UNIFIÉE) --- */
    .password-wrapper {
        position: relative;
        width: 100%;
        height: 58px;
    }

    /* Le bouton SVG doit avoir la même hauteur et être centré verticalement */
    .toggle-password {
        position: absolute;
        top: 50%;
        right: 18px;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
    }

    .toggle-password svg {
        width: 20px;
        height: 20px;
        stroke: #888;
        fill: none;
        stroke-width: 2.5;
        transition: stroke 0.3s ease;
    }

    .toggle-password:hover svg {
        stroke: var(--gold, #d4af37);
    }

    .toggle-password.active svg {
        stroke: var(--gold, #d4af37);
    }

    /* Bouton Submit */
    .auth-button {
        width: 100%;
        height: 58px;
        background: var(--charcoal, #333);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
        transition: all 0.3s ease;
    }

    .auth-button:hover {
        background: var(--gold, #d4af37);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }

    .auth-link {
        display: block;
        margin-top: 30px;
        color: var(--gold, #d4af37);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: opacity 0.3s;
    }

    .auth-link:hover {
        opacity: 0.8;
        text-decoration: underline;
    }

    .auth-error {
        color: #c23a3a;
        font-size: 0.8rem;
        margin-top: 6px;
        padding: 5px;
        background: rgba(194, 58, 58, 0.05);
        border-radius: 4px;
        text-align: left;
    }

    @media (max-width: 600px) {
        .auth-card {
            padding: 40px 25px;
            margin: 0 15px;
        }
        .auth-shell {
            padding: 40px 15px;
            min-height: auto;
            align-items: start;
        }
        .auth-card h2 {
            font-size: 1.5rem;
        }
    }
</style>

{% endblock %}
