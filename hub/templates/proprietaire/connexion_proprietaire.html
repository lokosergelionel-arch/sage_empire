{% extends 'base.html' %}

{% block content %}
<div style="background-color: #0B0B0B; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: #1A1A1A; width: 100%; max-width: 450px; padding: 40px; border-radius: 20px; border: 1px solid rgba(212, 160, 23, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">

        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: #D4A017; font-family: serif; font-size: 28px; margin-bottom: 10px;">Portail Propriétaire</h2>
            <p style="color: #a0a0a0; font-size: 14px;">Accédez à la gestion de vos biens immobiliers</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label style="color: #D4A017; display: block; margin-bottom: 8px; font-size: 14px;">Identifiant</label>
                <input type="text" name="username" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; outline: none; focus: border-color: #D4A017;">
            </div>

            <div style="margin-bottom: 30px;">
                <label style="color: #D4A017; display: block; margin-bottom: 8px; font-size: 14px;">Mot de passe</label>
                <input type="password" name="password" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; outline: none;">
            </div>

            <button type="submit" style="width: 100%; background: #D4A017; color: black; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s;">
                SE CONNECTER AU DASHBOARD
            </button>
        </form>

        <div style="margin-top: 25px; text-align: center;">
            <a href="{% url 'inscription_proprietaire' %}" style="color: #a0a0a0; font-size: 13px; text-decoration: none;">Pas encore partenaire ? <span style="color: #D4A017;">Rejoignez-nous</span></a>
        </div>
    </div>
</div>
{% endblock %}
