{% extends 'proprietaire/base_proprietaire.html' %}
{% load custom_filters %}

{% block proprietaire_content %}
<div style="background-color: #f8f9fa; min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    <div style="width: 100%; max-width: 500px; background: #ffffff; border: 1px solid #e0e0e0; border-radius: 20px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); padding: 40px;">

        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: #000; font-weight: 800; font-size: 1.6rem; margin-bottom: 10px;">Finalisez votre inscription</h2>
            <p style="color: #666; font-size: 0.95rem;">Complétez vos informations pour activer votre espace propriétaire.</p>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #333;">Nom complet</label>
                <input type="text" name="nom_complet" placeholder="Ex: Jean Dupont" required style="width: 100%; padding: 12px 15px; border: 1px solid #ced4da; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #333;">Adresse Email</label>
                <input type="email" name="email" placeholder="votre@email.com" required style="width: 100%; padding: 12px 15px; border: 1px solid #ced4da; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #333;">Mot de passe</label>
                <input type="password" name="password" placeholder="********" required style="width: 100%; padding: 12px 15px; border: 1px solid #ced4da; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #333;">Numéro WhatsApp</label>
                <input type="text" name="contact_whatsapp" placeholder="Ex: 22890000000" required style="width: 100%; padding: 12px 15px; border: 1px solid #ced4da; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #333;">Photo de profil (optionnel)</label>
                <input type="file" name="photo_profil" style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 10px; font-size: 0.9rem; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 30px; text-align: left;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #333;">Présentation / Biographie</label>
                <textarea name="biographie" rows="3" placeholder="Décrivez brièvement votre activité..." style="width: 100%; padding: 12px 15px; border: 1px solid #ced4da; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; resize: vertical;"></textarea>
            </div>

            <button type="submit" style="width: 100%; padding: 15px; background-color: #d4a017; color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(212, 160, 23, 0.3);">
                Valider mon inscription
            </button>
        </form>

    </div>
</div>
{% endblock %}
