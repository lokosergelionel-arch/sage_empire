{% extends 'proprietaire/base_proprietaire.html' %}
{% load custom_filters %}

{% block proprietaire_content %}
<div class="container-fluid" style="background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-md-6 col-lg-5">

            <!-- Carte centrée comme sur la 2ème image -->
            <div class="p-4 p-md-5" style="background: #ffffff; border: 1px solid #e0e0e0; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">

                <div class="text-center mb-4">
                    <h2 style="color: #000; font-weight: 700; font-size: 1.8rem; margin-bottom: 10px;">Finalisez votre inscription</h2>
                    <p style="color: #666; font-size: 0.95rem;">Complétez vos informations pour activer votre espace propriétaire</p>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #333; font-size: 0.9rem;">Nom complet</label>
                        <input type="text" name="nom_complet" class="form-control custom-input" placeholder="Ex: Jean Dupont" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #333; font-size: 0.9rem;">Adresse Email</label>
                        <input type="email" name="email" class="form-control custom-input" placeholder="votre@email.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #333; font-size: 0.9rem;">Mot de passe</label>
                        <input type="password" name="password" class="form-control custom-input" placeholder="********" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #333; font-size: 0.9rem;">Numéro WhatsApp</label>
                        <input type="text" name="contact_whatsapp" class="form-control custom-input" placeholder="Ex: 22890000000" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #333; font-size: 0.9rem;">Photo de profil (optionnel)</label>
                        <input type="file" name="photo_profil" class="form-control custom-input">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #333; font-size: 0.9rem;">Présentation / Biographie</label>
                        <textarea name="biographie" class="form-control custom-input" rows="3" placeholder="Décrivez brièvement votre activité..."></textarea>
                    </div>

                    <!-- Bouton jaune/doré comme sur la 2ème image -->
                    <button type="submit" class="btn w-100 py-3 fw-bold" style="background-color: #d4a017; color: #000; border: none; border-radius: 10px; font-size: 1rem; text-transform: none;">
                        Valider mon inscription
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>

<style>
    /* Style des inputs calqué sur la 2ème image */
    .custom-input {
        border: 1px solid #ced4da !important;
        border-radius: 10px !important;
        padding: 12px 15px !important;
        background-color: #fff !important;
        font-size: 0.95rem !important;
    }
    .custom-input:focus {
        border-color: #d4a017 !important;
        box-shadow: 0 0 0 0.2rem rgba(212, 160, 23, 0.15) !important;
        outline: none;
    }
    .btn:hover {
        background-color: #b8860b !important;
        transition: 0.3s;
    }
</style>
{% endblock %}
