{% extends 'proprietaire/base_proprietaire.html' %}
{% load custom_filters %}

{% block proprietaire_content %}
<div class="container-fluid" style="background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    <div class="row justify-content-center w-100">
        <div class="col-12 col-md-8 col-lg-5">

            <div class="auth-card p-4 p-md-5" style="background: #ffffff; border: 1px solid #e0e0e0; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">

                <div class="text-center mb-4">
                    <h2 style="color: #000; font-weight: 800; font-size: 1.8rem;">Finalisez votre inscription</h2>
                    <p style="color: #666;">Complétez vos informations pour activer votre espace propriétaire</p>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Bloc Nom -->
                    <div class="mb-3">
                        <label class="form-label d-block fw-bold" style="text-align: left; color: #333;">Nom complet</label>
                        <input type="text" name="nom_complet" class="form-control" style="width: 100%; border-radius: 10px; padding: 12px;" placeholder="Ex: Jean Dupont" required>
                    </div>

                    <!-- Bloc Email -->
                    <div class="mb-3">
                        <label class="form-label d-block fw-bold" style="text-align: left; color: #333;">Adresse Email</label>
                        <input type="email" name="email" class="form-control" style="width: 100%; border-radius: 10px; padding: 12px;" placeholder="votre@email.com" required>
                    </div>

                    <!-- Bloc Password -->
                    <div class="mb-3">
                        <label class="form-label d-block fw-bold" style="text-align: left; color: #333;">Mot de passe</label>
                        <input type="password" name="password" class="form-control" style="width: 100%; border-radius: 10px; padding: 12px;" placeholder="********" required>
                    </div>

                    <!-- Bloc WhatsApp -->
                    <div class="mb-3">
                        <label class="form-label d-block fw-bold" style="text-align: left; color: #333;">Numéro WhatsApp</label>
                        <input type="text" name="contact_whatsapp" class="form-control" style="width: 100%; border-radius: 10px; padding: 12px;" placeholder="Ex: 228XXXXXXXX" required>
                    </div>

                    <!-- Bloc Photo -->
                    <div class="mb-3">
                        <label class="form-label d-block fw-bold" style="text-align: left; color: #333;">Photo de profil (optionnel)</label>
                        <input type="file" name="photo_profil" class="form-control" style="width: 100%; border-radius: 10px; padding: 10px;">
                    </div>

                    <!-- Bloc Bio -->
                    <div class="mb-4">
                        <label class="form-label d-block fw-bold" style="text-align: left; color: #333;">Présentation / Biographie</label>
                        <textarea name="biographie" class="form-control" rows="3" style="width: 100%; border-radius: 10px; padding: 12px;" placeholder="Décrivez votre activité..."></textarea>
                    </div>

                    <!-- Bouton Centré et Large -->
                    <button type="submit" class="btn w-100 py-3 fw-bold" style="background-color: #d4a017; color: #fff; border: none; border-radius: 10px; font-size: 1.1rem; transition: 0.3s;">
                        VALIDER MON INSCRIPTION
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>

<style>
    /* On écrase toute mise en forme bizarre qui viendrait du CSS parent */
    .form-label {
        margin-bottom: 8px !important;
    }
    .form-control:focus {
        border-color: #d4a017 !important;
        box-shadow: 0 0 0 0.2rem rgba(212, 160, 23, 0.1) !important;
    }
    .btn:hover {
        background-color: #b8860b !important;
        transform: translateY(-1px);
    }
</style>
{% endblock %}
