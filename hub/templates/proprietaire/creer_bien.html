{% extends 'base.html' %}

{% block content %}
<div style="background-color: #0B0B0B; min-height: 100vh; color: #ffffff; padding-bottom: 50px;">

    <div style="background-color: #1A1A1A; border-bottom: 1px solid rgba(212, 160, 23, 0.2); padding: 40px 20px;">
        <div style="max-width: 800px; margin: 0 auto;">
            <h1 style="color: #D4A017; font-family: serif; font-size: 32px; margin: 0;">Ajouter un nouveau bien</h1>
            <p style="color: #a0a0a0; margin-top: 5px;">Remplissez les informations pour publier votre annonce</p>
        </div>
    </div>

    <div style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
        <form method="POST" enctype="multipart/form-data" style="background: #1A1A1A; padding: 30px; border-radius: 20px; border: 1px solid rgba(212, 160, 23, 0.1);">
            {% csrf_token %}

           <!-- Ligne 1 : Titre et Prix -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
    <div>
        <label style="color: #D4A017; display: block; margin-bottom: 8px;">Titre du bien</label>
        <input type="text" name="titre" placeholder="Ex: Villa Luxe à Cocody" required style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; focus: border-color: #D4A017;">
    </div>
    <div>
        <label style="color: #D4A017; display: block; margin-bottom: 8px;">Prix (FCFA)</label>
        <input type="number" name="prix" placeholder="Prix en FCFA" required style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none;">
    </div>
</div>

<!-- Ligne 2 : Type de bien et Quartier (AJOUTÉ) -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
    <div>
        <label style="color: #D4A017; display: block; margin-bottom: 8px;">Type de bien</label>
        <select name="type_bien" required style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none;">
            <option value="Appartement">Appartement</option>
            <option value="Villa">Villa</option>
            <option value="Studio">Studio</option>
            <option value="Bureau">Bureau</option>
            <option value="Terrain">Terrain</option>
        </select>
    </div>
    <div>
        <label style="color: #D4A017; display: block; margin-bottom: 8px;">Quartier / Localisation</label>
        <input type="text" name="quartier" placeholder="Ex: Cocody, Riviera 3, Plateau..." required style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none;">
    </div>
</div>
            <div style="margin-bottom: 20px;">
                <label style="color: #D4A017; display: block; margin-bottom: 8px;">Description</label>
                <textarea name="description" rows="5" placeholder="Décrivez le bien en détail..." style="width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px;"></textarea>
            </div>

            <!-- SECTION MEDIA -->
            <div style="background: #0B0B0B; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 30px;">
                <h3 style="color: #D4A017; font-size: 18px; margin-top: 0;">Médias du bien</h3>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-size: 14px;">Photos (Sélectionnez plusieurs fichiers)</label>
                    <input type="file" name="images" id="images" multiple accept="image/*" style="color: #a0a0a0;">
                </div>

                <div>
                    <label style="display: block; margin-bottom: 5px; font-size: 14px;">Vidéo de présentation</label>
                    <input type="file" name="video" id="video" accept="video/*" style="color: #a0a0a0;">
                </div>
            </div>

            <div style="display: flex; gap: 15px;">
                <button type="submit" style="flex: 2; background: #D4A017; color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">
                    PUBLIER L'ANNONCE
                </button>
                <a href="{% url 'mes_biens' %}" style="flex: 1; text-align: center; background: transparent; color: #fff; padding: 15px; border: 1px solid #333; border-radius: 10px; text-decoration: none; font-weight: bold;">
                    ANNULER
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
