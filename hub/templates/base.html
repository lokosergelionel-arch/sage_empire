{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sage Empire{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        :root {
            --gold: #B5935E;
            --charcoal: #1A1A1A;
            --ivory: #F9F8F6;
            --border: #E5E2DA;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ivory);
            color: var(--charcoal);
            margin: 0;
            padding: 0;
        }

        .navbar {
            background: white;
            border-bottom: 1px solid #eeeae3;
            padding: 18px 5%;
        }

        .navbar-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 42px;
            width: auto;
            display: block;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-link {
            color: var(--charcoal);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.25s ease;
        }

        .nav-link:hover {
            color: var(--gold);
        }

        footer {
            background: var(--charcoal);
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 50px;
        }

        footer p {
            margin: 0;
        }

        @media (max-width: 768px) {
            .navbar-inner {
                flex-direction: column;
                gap: 18px;
            }

            .nav-menu {
                gap: 18px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .logo-img {
                height: 38px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="{% url 'home' %}" class="logo-link">
                <img src="{% static 'images/logo.png' %}" alt="Sage Empire" class="logo-img">
            </a>

            <div class="nav-menu">
                <a href="{% url 'home' %}" class="nav-link">Hub Services</a>
                <a href="{% url 'galerie_mode' %}" class="nav-link">Marketplace</a>
                <a href="{% url 'login' %}" class="nav-link">Mon Espace</a>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer>
        <p>&copy; 2026 Sage Empire - Tous droits réservés</p>
    </footer>

</body>
</html>
