{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 80px auto; padding: 20px; background: #fff; border: 1px solid #d4af37; text-align: center;">
    <h2 style="color: #1a1a1a; font-family: 'Playfair Display', serif;">Réinitialisation</h2>
    <p>Saisissez votre e-mail pour recevoir un lien de récupération.</p>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <input type="email" name="email" placeholder="Votre e-mail" required 
                   style="width: 100%; padding: 10px; border: 1px solid #ccc;">
        </div>
        <button type="submit" style="background: #1a1a1a; color: #d4af37; padding: 10px 20px; border: none; cursor: pointer; width: 100%;">
            ENVOYER LE LIEN
        </button>
    </form>
</div>
{% endblock %}
