{% extends 'base_auth.html' %}

{% block auth_title %}Nouveau mot de passe{% endblock %}

{% block auth_content %}
    <h2>Créer un nouveau mot de passe</h2>
    <p class="mb-4">Veuillez entrer votre nouveau mot de passe ci-dessous.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_div }}
        <button type="submit" class="btn-gold">Changer le mot de passe</button>
    </form>
{% endblock %}
