{% extends 'base_auth.html' %}

{% block auth_title %}Nouveau mot de passe{% endblock %}

{% block auth_content %}
    <h2>Créer un nouveau mot de passe</h2>

    <h2>Confirmer votre mot de passe</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_div }}
        <button type="submit" class="btn-gold">Changer mon mot de passe</button>
    </form>
{% endblock %}
