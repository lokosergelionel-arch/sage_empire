{% extends 'base_auth.html' %}

{% block auth_title %}Nouveau mot de passe{% endblock %}

{% block auth_content %}
    <h2>Nouveau mot de passe</h2>
    <p class="auth-subtitle">
        Veuillez choisir un nouveau mot de passe sécurisé.
    </p>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_div }}
        <button type="submit" class="auth-button">Valider le nouveau mot de passe</button>
    </form>
{% endblock %}
