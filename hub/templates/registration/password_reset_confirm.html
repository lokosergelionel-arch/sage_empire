{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 80px auto; padding: 20px; background: #fff; border: 1px solid #d4af37; text-align: center;">
    <h2 style="color: #1a1a1a;">Nouveau mot de passe</h2>
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="background: #1a1a1a; color: #d4af37; padding: 10px 20px; border: none; cursor: pointer; width: 100%;">
                CONFIRMER LE CHANGEMENT
            </button>
        </form>
    {% else %}
        <p style="color: red;">Le lien de réinitialisation est invalide ou a expiré.</p>
        <a href="{% url 'password_reset' %}" style="color: #d4af37;">Recommencer la demande</a>
    {% endif %}
</div>
{% endblock %}
