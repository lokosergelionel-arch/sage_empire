{% extends 'base_auth.html' %}

{% block auth_title %}Mot de passe modifié{% endblock %}

{% block auth_content %}
    <h2>Mot de passe modifié avec succès</h2>
    <p class="auth-subtitle">
        Votre mot de passe a été réinitialisé.<br>
        Vous pouvez maintenant vous connecter à votre espace créateur.
    </p>

    <a href="{% url 'login' %}" class="auth-button" style="display:flex; align-items:center; justify-content:center; text-decoration:none;">
        Se connecter
    </a>
{% endblock %}
