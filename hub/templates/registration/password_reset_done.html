{% extends 'base_auth.html' %}

{% block auth_title %}Vérification envoyée{% endblock %}

{% block auth_content %}
    <span class="success-icon">📧</span>
    <h2>Vérification envoyée !</h2>
    <p>Un email de confirmation a été envoyé à <strong>{{ email }}</strong>.</p>
    <p>Veuillez vérifier votre boîte de réception (et les spams).</p>

    <a href="{% url 'login' %}" class="btn-gold">Retour à la connexion</a>
{% endblock %}
