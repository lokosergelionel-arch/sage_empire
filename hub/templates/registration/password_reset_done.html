{% extends 'base_auth.html' %}

{% block auth_title %}Lien envoyé{% endblock %}

{% block auth_content %}
    <div class="text-center">
        <span class="success-icon">📧</span>
        <h2>Lien envoyé avec succès !</h2>
        <p>Un email de réinitialisation a été envoyé à <strong>{{ email }}</strong>.</p>
        <p class="text-muted">Veuillez vérifier votre boîte de réception et vos spams.</p>

        <a href="{% url 'login' %}" class="btn-gold mt-4">Retour à la connexion</a>
    </div>
{% endblock %}
