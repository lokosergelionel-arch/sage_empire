{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE EMPIRE | Devenir Partenaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #F9F8F6;
            --charcoal: #1A1A1A;
            --gold: #B5935E;
            --border: #E5E2DA;
            --white: #ffffff;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--ivory);
            color: var(--charcoal);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-minimal {
            padding: 40px;
            text-align: center;
        }

        .header-minimal img {
            height: 60px;
            margin-bottom: 20px;
        }

        .form-container {
            background: var(--white);
            padding: 50px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
            margin-bottom: 50px;
            box-sizing: border-box; /* Assure que le padding ne dépasse pas */
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Stylisation auto des champs Django */
        form p {
            margin-bottom: 20px;
        }

        form label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: bold;
        }

        form input, form textarea, form select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            background: var(--ivory);
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        form input:focus {
            outline: none;
            border-color: var(--gold);
            background: white;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--charcoal);
            color: white;
            border: none;
            font-family: 'Lato', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: var(--gold);
        }

        .back-link {
            margin-top: 20px;
            text-decoration: none;
            color: #aaa;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--charcoal);
        }

        /* --- AJOUT POUR LE TÉLÉPHONE UNIQUEMENT --- */
        @media (max-width: 600px) {
            .form-container {
                width: 90%;          /* On resserre le bloc à 90% de l'écran */
                padding: 30px 20px;  /* On réduit le padding interne pour gagner de la place */
                margin-top: 10px;
            }

            h2 {
                font-size: 1.3rem;   /* On réduit un peu le titre sur mobile */
            }

            form input, form textarea {
                font-size: 16px;     /* Évite le zoom auto sur iPhone */
            }
        }
    </style>
</head>
<body>

    <div class="header-minimal">
        <a href="{% url 'home' %}">
            <img src="{% static 'images/logo.png' %}" alt="Sage Empire Logo">
        </a>
    </div>

    <div class="form-container">
        <h2>Rejoindre l'Empire</h2>
        <p class="subtitle">Exposez votre talent à l'excellence</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Créer mon profil créateur</button>
        </form>

        <div style="text-align: center;">
            <a href="{% url 'home' %}" class="back-link">← RETOUR À L'ACCUEIL</a>
        </div>
    </div>

</body>
</html>
