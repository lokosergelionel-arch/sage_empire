{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE EMPIRE | Modifier mon Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #B5935E;
            --charcoal: #1A1A1A;
            --ivory: #F9F8F6;
            --border: #E5E2DA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ivory);
            color: var(--charcoal);
            padding: 20px 15px;
            min-height: 100vh;
        }

        .edit-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .edit-header {
            background: var(--charcoal);
            color: white;
            text-align: center;
            padding: 25px 20px;
        }

        .edit-header h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .profile-preview {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            overflow: hidden;
            margin: 20px auto;
            background: #f0f0f0;
        }

        .profile-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            padding: 30px 25px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--ivory);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        textarea { min-height: 100px; resize: vertical; }

        .btn-upload {
            display: block;
            width: 100%;
            padding: 14px;
            background: #333;
            color: white;
            text-align: center;
            border-radius: 8px;
            margin: 15px 0 25px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #777;
            text-decoration: none;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .content { padding: 25px 18px; }
        }
    </style>
</head>
<body>

<div class="edit-container">
    <div class="edit-header">
        <h2>Modifier mon Profil</h2>
    </div>

    <div class="content">
        <!-- Photo Preview -->
        <div class="profile-preview">
            {% if styliste.photo_profil %}
                <img src="{{ styliste.photo_profil.url }}" alt="Photo de profil">
            {% else %}
                <img src="https://ui-avatars.com/api/?name={{ styliste.nom_marque }}&background=f9f8f6&color=b5935e" alt="Photo de profil">
            {% endif %}
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <small style="color:#e74c3c;">{{ field.errors }}</small>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn-save">Enregistrer les modifications</button>
        </form>

        <a href="{% url 'dashboard_styliste' %}" class="back-link">← Retour au Tableau de bord</a>
    </div>
</div>

</body>
</html>
