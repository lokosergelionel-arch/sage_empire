{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE EMPIRE | Modifier mon Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #F9F8F6;
            --charcoal: #1A1A1A;
            --gold: #B5935E;
            --border: #E5E2DA;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--ivory);
            margin: 0;
            padding: 40px 5%;
            display: flex;
            justify-content: center;
        }

        .edit-container {
            background: white;
            padding: 40px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        h2 {
            font-family: 'Cinzel', serif;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .current-avatar-wrapper {
            text-align: center;
            margin-bottom: 30px;
        }

        .current-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            padding: 3px;
        }

        form p { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            background: var(--ivory);
            box-sizing: border-box;
            font-family: 'Lato', sans-serif;
        }

        .btn-save {
            width: 100%;
            padding: 18px;
            background: var(--charcoal);
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-save:hover { background: var(--gold); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: #888;
            font-size: 0.8rem;
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .edit-container { padding: 25px 20px; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="edit-container">
    <h2>Édition du Profil</h2>

    <div class="current-avatar-wrapper">
        {% if styliste.photo_profil %}
            <img src="{{ styliste.photo_profil.url }}" class="current-avatar" alt="Photo actuelle">
        {% else %}
            <img src="{% static 'images/default-avatar.png' %}" class="current-avatar">
        {% endif %}
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {% for field in form %}
            <p>
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <small style="color: #999;">{{ field.help_text }}</small>
                {% endif %}
            </p>
        {% endfor %}

        <button type="submit" class="btn-save">Mettre à jour mon profil</button>
    </form>

    <a href="javascript:history.back()" class="back-link">← ANNULER ET RETOURNER</a>
</div>

</body>
</html>
